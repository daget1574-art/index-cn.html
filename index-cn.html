<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>逃避型人格诊断测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        .header {
            background: white;
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }
        .header h1 {
            font-size: 2.5em;
            color: #1a1a1a;
            margin-bottom: 10px;
        }
        .header p {
            color: #666;
            font-size: 1.1em;
        }
        .category {
            background: white;
            border-radius: 15px;
            margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            overflow: hidden;
        }
        .category-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            font-size: 1.1em;
        }
        .category-header:hover {
            background: linear-gradient(135deg, #5568d3 0%, #6a3f92 100%);
        }
        .category-content {
            padding: 30px;
            display: none;
        }
        .category-content.active {
            display: block;
        }
        .question {
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
        }
        .question:last-child {
            border-bottom: none;
        }
        .question-number {
            font-weight: bold;
            color: #667eea;
            margin-right: 10px;
        }
        .question-text {
            font-size: 1em;
            color: #333;
            margin-bottom: 12px;
            font-weight: 500;
        }
        .answers {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .answer-btn {
            width: 45px;
            height: 45px;
            border: 2px solid #ddd;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.9em;
            transition: all 0.3s;
        }
        .answer-btn:hover {
            border-color: #667eea;
            background: #f0f4ff;
        }
        .answer-btn.selected {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        .submit-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s;
        }
        .submit-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .results {
            display: none;
            background: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .results.active {
            display: block;
        }
        .score-box {
            text-align: center;
            padding: 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 15px;
            margin-bottom: 30px;
        }
        .score-number {
            font-size: 3em;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .score-label {
            font-size: 1.3em;
            margin-bottom: 15px;
        }
        .score-level {
            display: inline-block;
            padding: 10px 20px;
            background: rgba(255,255,255,0.3);
            border-radius: 20px;
            font-weight: bold;
        }
        .category-score {
            background: #f5f7fa;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .category-score-name {
            font-weight: bold;
            color: #333;
        }
        .category-score-value {
            font-size: 1.3em;
            font-weight: bold;
            color: #667eea;
        }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #ddd;
            border-radius: 10px;
            margin-top: 8px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s;
        }
        .interpretation {
            background: #e3f2fd;
            border-left: 4px solid #667eea;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .interpretation h3 {
            color: #667eea;
            margin-bottom: 10px;
        }
        .interpretation p {
            color: #333;
            line-height: 1.6;
            margin-bottom: 8px;
        }
        .progress-text {
            text-align: center;
            color: #666;
            font-size: 0.9em;
            margin-bottom: 20px;
        }
        .reset-btn {
            width: 100%;
            padding: 12px;
            background: #666;
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .reset-btn:hover {
            background: #555;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>逃避型人格诊断测试</h1>
            <p>通过100个问题诊断您的逃避型倾向</p>
            <p style="font-size: 0.9em; margin-top: 15px;">请对每个问题给出1-5分的评分 (1=完全不同意, 5=非常同意)</p>
        </div>

        <div id="questionsContainer"></div>

        <div id="results" class="results">
            <h2 style="margin-bottom: 30px; text-align: center;">测试结果</h2>
            <div class="score-box">
                <div class="score-label">综合得分</div>
                <div class="score-number" id="totalScore">0%</div>
                <div class="score-level" id="scoreLevel">非常低</div>
            </div>

            <div class="interpretation">
                <h3>结果解读</h3>
                <div id="interpretationText"></div>
            </div>

            <h3 style="margin-bottom: 20px;">各类别分析</h3>
            <div id="categoryScores"></div>

            <button class="reset-btn" onclick="location.reload()">重新测试</button>
        </div>
    </div>

    <script>
        const questions = {
            "亲密关系回避": [
                "当有人向我表达深层感情时,我感到不适",
                "长期的关系承诺让我害怕",
                "我讨厌依赖他人",
                "当有人侵犯我的个人空间时,我感到烦恼",
                "伴侣频繁联系时我感到压力",
                "当关系变得过于亲密时,我倾向于保持距离",
                "我更倾向于独立的关系而非情感亲密",
                "当他人试图了解我时,我会设置心理防线",
                "长时间在一起后,我想要独处",
                "我倾向于避免深层的情感对话"
            ],
            "情感表达抑制": [
                "我不容易表现出自己的感情",
                "即使感到伤心,我也不愿向他人表现",
                "寻求帮助让我觉得自己很弱",
                "我习惯隐藏自己的愤怒",
                "我极力避免表现出脆弱的一面",
                "因为感情而流泪让我感到尴尬",
                "向他人诉说我的问题感觉像在添麻烦",
                "我难以理解情感表达很丰富的人",
                "即使与亲密的人,我也隐藏真实感受",
                "我认为表达情感会伤害关系"
            ],
            "社交距离": [
                "我倾向于独处而非与许多朋友交往",
                "与人社交对我来说很累",
                "我不想参加社交聚会或派对",
                "当有人对我表示关心时我感到不适",
                "我不想与他人进行深入对话",
                "我极其讨厌朋友干涉我的事务",
                "满足他人的期望对我来说是负担",
                "我更喜欢独立行动而非融入集体",
                "他人需要我本身就让我反感",
                "我不想花精力维持关系"
            ],
            "责任回避": [
                "我倾向于拖延不愉快或困难的事情",
                "我倾向于回避而非直面冲突",
                "问题出现时我想逃避",
                "需要做决定时我会一直拖延",
                "我倾向于避免有义务感的承诺",
                "我不想承担责任重的职位",
                "当需要进行困难的对话时我会回避",
                "可能失败的情况我从一开始就不做",
                "满足他人期望的责任感让我压力很大",
                "需要长期规划的工作我不想做"
            ],
            "过度强调独立": [
                "我不想向任何人寻求帮助",
                "我认为应该能够独自解决所有问题",
                "欠他人人情的感觉让我讨厌",
                "接受他人帮助会伤害我的自尊",
                "我认为只有完全独立才有价值",
                "我无法想象依赖他人",
                "与其团队合作,我更喜欢独自工作",
                "与他人建立依赖关系让我害怕",
                "我很难向他人请求金钱或情感支持",
                "我不想承认自己的弱点"
            ],
            "冲突回避": [
                "当有不同意见时,我会同意对方",
                "我倾向于沉默而非表达自己的观点",
                "与他人争执后我想完全断绝关系",
                "在冲突中我认为逃避比对抗更好",
                "为了取悦他人我会隐藏自己的想法",
                "被批评让我非常害怕",
                "当关系出现问题时我会逃避",
                "我绝不会提起令人不适的话题",
                "我不想经历争执的过程",
                "意见不同会让我觉得关系要结束了"
            ],
            "信任缺乏": [
                "我不知道何时他人会背弃我",
                "我很难相信他人的承诺",
                "我倾向于怀疑他人的真实意图",
                "当有人对我好时,我觉得有隐情",
                "我怀疑是否存在完全可以信任的人",
                "向他人表现脆弱让我觉得会被利用",
                "在关系中我总是很谨慎",
                "我无法将亲密的秘密告诉他人",
                "我不清楚他人的真实意图",
                "我需要很长时间才能信任他人"
            ],
            "情感迟钝": [
                "我很难察觉他人的情感变化",
                "当他人痛苦时我不知道该做什么",
                "我在适应他人的情绪方面努力不足",
                "在情感场景中我感到不自在",
                "他人哭泣时我不知道如何反应",
                "当情感表达过度时我会回避",
                "他人的感情对我影响较小",
                "我常被说缺乏同理心",
                "提供情感支持时我感到不适",
                "我不想深入了解他人的情感问题"
            ],
            "自我中心": [
                "我讨厌他人侵犯我的时间和空间",
                "我认为自己的需求比他人的更重要",
                "我常常不关心他人的不便",
                "我只做自己想做的事",
                "我更多地考虑自己的想法而非他人的感受",
                "关心他人有时让我感到烦恼",
                "我非常不喜欢改变自己的计划",
                "满足他人的期望让我烦躁",
                "在关系中我的便利最重要",
                "我优先考虑自己的舒适而非他人的感受"
            ],
            "回避性应对": [
                "问题出现时我用饮酒或购物来排解",
                "压力大时我会退出关系",
                "情感困难时我选择独处",
                "我认为忽视不适的感受是更好的办法",
                "在困难情况中我不想真正面对",
                "我集中在其他事物上而非直视问题",
                "我试图不去感受负面情绪",
                "我认为时间会解决关系问题",
                "我常常陷入自己的世界逃避现实",
                "我倾向于封闭难以克服的情感"
            ]
        };

        let responses = {};

        function initQuestions() {
            const container = document.getElementById('questionsContainer');
            let questionNum = 1;

            Object.entries(questions).forEach((entry, categoryIdx) => {
                const [category, items] = entry;
                const categoryDiv = document.createElement('div');
                categoryDiv.className = 'category';
                
                const header = document.createElement('div');
                header.className = 'category-header';
                header.innerHTML = `
                    <div>${category}</div>
                    <div>▼</div>
                `;
                header.onclick = () => {
                    const content = categoryDiv.querySelector('.category-content');
                    content.classList.toggle('active');
                    header.style.background = content.classList.contains('active') 
                        ? 'linear-gradient(135deg, #5568d3 0%, #6a3f92 100%)'
                        : 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)';
                };

                const content = document.createElement('div');
                content.className = 'category-content';
                
                items.forEach((question) => {
                    const questionDiv = document.createElement('div');
                    questionDiv.className = 'question';
                    questionDiv.innerHTML = `
                        <div class="question-text">
                            <span class="question-number">${questionNum}.</span>${question}
                        </div>
                        <div class="answers">
                            ${[1,2,3,4,5].map(score => `
                                <button class="answer-btn" onclick="answerQuestion(${questionNum-1}, ${score}, this)">
                                    ${score}
                                </button>
                            `).join('')}
                        </div>
                    `;
                    content.appendChild(questionDiv);
                    questionNum++;
                });

                categoryDiv.appendChild(header);
                categoryDiv.appendChild(content);
                container.appendChild(categoryDiv);
            });

            const submitBtn = document.createElement('button');
            submitBtn.className = 'submit-btn';
            submitBtn.textContent = '查看结果';
            submitBtn.id = 'submitBtn';
            submitBtn.onclick = showResults;
            container.appendChild(submitBtn);

            const progressDiv = document.createElement('div');
            progressDiv.className = 'progress-text';
            progressDiv.id = 'progressText';
            progressDiv.textContent = '已完成 0/100';
            container.insertBefore(progressDiv, submitBtn);
        }

        function answerQuestion(idx, score, btn) {
            responses[idx] = score;
            const btns = btn.parentElement.querySelectorAll('.answer-btn');
            btns.forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            updateProgress();
        }

        function updateProgress() {
            const answered = Object.keys(responses).length;
            document.getElementById('progressText').textContent = `已完成 ${answered}/100`;
            const submitBtn = document.getElementById('submitBtn');
            if (answered === 100) {
                submitBtn.disabled = false;
                submitBtn.style.opacity = '1';
            } else {
                submitBtn.disabled = true;
                submitBtn.style.opacity = '0.5';
            }
        }

        function showResults() {
            const categoryScores = {};
            let totalScore = 0;

            const categoryEntries = Object.entries(questions);
            let questionIdx = 0;

            categoryEntries.forEach(([category, items]) => {
                let categoryScore = 0;
                items.forEach(() => {
                    categoryScore += responses[questionIdx] || 0;
                    totalScore += responses[questionIdx] || 0;
                    questionIdx++;
                });
                categoryScores[category] = {
                    score: categoryScore,
                    max: items.length * 5,
                    percentage: Math.round((categoryScore / (items.length * 5)) * 100)
                };
            });

            const totalPercentage = Math.round((totalScore / 500));

            let levelText = '非常低';
            let levelColor = 'rgb(52, 211, 153)';

            if (totalPercentage >= 80) {
                levelText = '非常高 (建议咨询专业人士)';
                levelColor = 'rgb(239, 68, 68)';
            } else if (totalPercentage >= 60) {
                levelText = '较高 (需要改进)';
                levelColor = 'rgb(249, 115, 22)';
            } else if (totalPercentage >= 40) {
                levelText = '中等';
                levelColor = 'rgb(234, 179, 8)';
            } else if (totalPercentage >= 20) {
                levelText = '较低';
                levelColor = 'rgb(59, 130, 246)';
            }

            document.getElementById('totalScore').textContent = totalPercentage + '%';
            document.getElementById('scoreLevel').textContent = levelText;
            document.getElementById('scoreLevel').style.background = levelColor;
            document.getElementById('scoreLevel').style.color = 'white';

            const interpretations = {
                '非常低': '您的逃避型倾向非常低。您能够建立健康的人际关系。',
                '较低': '您的逃避型倾向较低。建立和维持健康关系对您来说相对容易。',
                '中等': '您具有中等程度的逃避型倾向。可以专注改进某些方面。',
                '较高 (需要改进)': '您的逃避型倾向相当明显。建议认识自己的行为模式并进行改进。',
                '非常高 (建议咨询专业人士)': '您的逃避型倾向非常强。建议咨询心理学专业人士。'
            };

            document.getElementById('interpretationText').innerHTML = `<p>${interpretations[levelText]}</p>`;

            const categoryScoresDiv = document.getElementById('categoryScores');
            categoryScoresDiv.innerHTML = '';

            Object.entries(categoryScores).forEach(([category, scores]) => {
                const div = document.createElement('div');
                div.className = 'category-score';
                div.innerHTML = `
                    <div>
                        <div class="category-score-name">${category}</div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${scores.percentage}%"></div>
                        </div>
                    </div>
                    <div class="category-score-value">${scores.percentage}%</div>
                `;
                categoryScoresDiv.appendChild(div);
            });

            document.getElementById('questionsContainer').style.display = 'none';
            document.getElementById('results').classList.add('active');
        }

        initQuestions();
    </script>
</body>
</html>
